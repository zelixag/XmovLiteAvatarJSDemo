<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <title>数字人 · Digital Human</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 本地敏感配置（仅开发环境下使用，放在 public/xmov_config.js，已被 .gitignore 忽略） -->
    <!-- Vite 会在生产构建时替换 import.meta.env.DEV -->
    <script type="module">
      if (import.meta.env && import.meta.env.DEV) {
        const script = document.createElement('script');
        script.src = '/xmov_config.js';
        document.head.appendChild(script);
      }
    </script>
    <!-- 调试用的移动端 console（仅移动端加载） -->
    <script>
      // 检测是否为移动端
      function isMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      }
      
      // 仅在移动端加载 eruda
      if (isMobile()) {
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/eruda';
        script.onload = function() {
          eruda.init();
        };
        document.head.appendChild(script);
      }
    </script>
    <!-- 公众号 JSSDK（仅移动端加载） -->
    <script>
      // 仅在移动端加载微信 JSSDK
      if (isMobile()) {
        var wxScript = document.createElement('script');
        wxScript.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
        document.head.appendChild(wxScript);
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
